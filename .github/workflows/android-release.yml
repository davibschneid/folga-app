name: Android Release (.aab)

# Builds a signed Android App Bundle ready to upload to Google Play Console
# (Internal testing / Closed testing / Production tracks). Triggered by:
#   - pushing a git tag matching `v*` (e.g. `v0.1.1`)
#   - manually via the "Run workflow" button on GitHub Actions
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64     base64 of your upload keystore (.jks)
#                       generate with: base64 -w0 upload-keystore.jks
#   KEYSTORE_PASSWORD   store password
#   KEY_ALIAS           key alias inside the keystore
#   KEY_PASSWORD        key password
#
# See DEPLOY.md for the full walkthrough (keystore generation, Play Console
# checklist, uploading the .aab).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    name: Build signed .aab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "11076708"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-release-${{ runner.os }}-
            gradle-${{ runner.os }}-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Restore upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Missing KEYSTORE_BASE64 secret. See DEPLOY.md for setup."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
          echo "KEYSTORE_FILE=$RUNNER_TEMP/upload-keystore.jks" >> "$GITHUB_ENV"

      - name: Build Android App Bundle (release)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :composeApp:bundleRelease --no-daemon --stacktrace

      - name: Build signed APK (release) for sideload / QA
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :composeApp:assembleRelease --no-daemon --stacktrace

      - name: Upload .aab artifact
        uses: actions/upload-artifact@v4
        with:
          name: folga-app-release-aab
          path: composeApp/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload .apk artifact
        uses: actions/upload-artifact@v4
        with:
          name: folga-app-release-apk
          path: composeApp/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Cleanup keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/upload-keystore.jks"
